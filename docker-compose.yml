services:
  frontend:
    build: ./frontend/chat
    container_name: frontend
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/chat/.env
    depends_on:
      - backend
    restart: always

  backend:
    build: ./backend
    # We use port 8000 inside the container to match your uvicorn command
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    container_name: backend
    ports:
      - "8001:8000"
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    depends_on:
      - chroma
      - ollama
      - db
    restart: always

  db:
    image: postgres:15
    container_name: postgres_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER_NAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD_STAR}
      POSTGRES_DB: ${POSTGRES_DB_NAME}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: always

  chroma:
    image: chromadb/chroma
    container_name: chroma
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma
    restart: always

volumes:
  ollama_data:
  chroma_data:
  postgres_data: